# Cloud Disk Configuration Example

disk:
  region_id: cn-north-1
  az: cn-north-1a
  name: my-data-disk
  description: Data disk for application storage
  disk_type: ssd  # ssd, premium-hdd, standard-hdd
  disk_size_gb: 100
  charge_spec:
    charge_mode: postpaid_by_usage  # or prepaid_by_duration

# Attachment configuration
attachment:
  instance_id: i-xxxxxxxx
  device: vdb  # vdb, vdc, vdd, etc.

# Snapshot configuration
snapshot:
  name: daily-backup
  description: Automated daily backup
  retention_days: 7