## Terraform变量文件示例

### 开发环境

```hcl
# dev.tfvars
environment     = "dev"
region          = "cn-north-1"
instance_count  = 1
instance_type   = "g.n2.small"
disk_size       = 40
bandwidth       = 5

tags = {
  Environment = "development"
  ManagedBy   = "terraform"
}
```

### 测试环境

```hcl
# test.tfvars
environment     = "test"
region          = "cn-north-1"
instance_count  = 2
instance_type   = "g.n2.medium"
disk_size       = 100
bandwidth       = 10

tags = {
  Environment = "testing"
  ManagedBy   = "terraform"
}
```

### 生产环境

```hcl
# prod.tfvars
environment     = "production"
region          = "cn-north-1"
instance_count  = 3
instance_type   = "g.n2.large"
disk_size       = 200
bandwidth       = 20

multi_az        = true
availability_zones = ["cn-north-1a", "cn-north-1b"]

tags = {
  Environment = "production"
  ManagedBy   = "terraform"
  Critical    = "true"
}
```

## Ansible Inventory示例

```yaml
# inventory.yml
all:
  children:
    web_servers:
      hosts:
        web-01:
          ansible_host: 192.168.1.10
          instance_id: i-xxxxx
          environment: production
        web-02:
          ansible_host: 192.168.1.11
          instance_id: i-xxxxx
          environment: production
          
    database_servers:
      hosts:
        db-primary:
          ansible_host: 192.168.2.10
          instance_id: i-xxxxx
          role: primary
        db-replica:
          ansible_host: 192.168.2.11
          instance_id: i-xxxxx
          role: replica
          
    vars:
      ansible_user: centos
      ansible_ssh_private_key_file: ~/.ssh/jdcloud.pem
      ansible_python_interpreter: /usr/bin/python3
```

## Docker部署示例

```yaml
# docker-compose.yml (在VM上运行)
version: '3.8'

services:
  web:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - frontend
      
  app:
    image: myapp:latest
    environment:
      - DATABASE_URL=mysql://user:pass@db:3306/mydb
      - REDIS_URL=redis://redis:6379
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    networks:
      - frontend
      - backend
      
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=mydb
      - MYSQL_USER=user
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - backend
      
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - backend

volumes:
  app-data:
  db-data:
  redis-data:

networks:
  frontend:
  backend:
```

## Kubernetes节点配置示例

```yaml
# k8s-node-config.yaml
instance:
  name_prefix: "k8s-node"
  description: "Kubernetes worker nodes"
  region_id: "cn-north-1"
  instance_type: "g.n2.xlarge"
  image_id: "img-centos-7.9-k8s"
  count: 3
  
storage:
  system_disk:
    disk_category: "cloud_ssd"
    disk_size_gb: 100
  data_disks:
    - disk_category: "cloud_ssd"
      disk_size_gb: 500
      device_name: "/dev/vdb"
      mount_point: "/var/lib/docker"
      filesystem: "ext4"

network:
  security_groups:
    - "sg-k8s-node"
  labels:
    node-role.kubernetes.io/worker: ""
    
kubernetes:
  version: "1.28"
  kubelet_config:
    max_pods: 110
    system_reserved:
      cpu: "500m"
      memory: "512Mi"
    kube_reserved:
      cpu: "500m"
      memory: "512Mi"
```

## 备份策略示例

```yaml
# backup-policy.yaml
backup:
  schedule:
    daily:
      time: "02:00"
      retention_days: 7
      
    weekly:
      day: "Sunday"
      time: "01:00"
      retention_weeks: 4
      
    monthly:
      day: 1
      time: "00:00"
      retention_months: 12
      
  targets:
    - type: "system_disk"
      include_all: true
      
    - type: "data_disk"
      device_names:
        - "/dev/vdb"
        - "/dev/vdc"
        
  notifications:
    on_success: false
    on_failure: true
    contact_group_id: 1
    
  cleanup:
    auto_delete_expired: true
    min_retention_count: 3
```

## 成本优化配置示例

```yaml
# cost-optimization.yaml
instances:
  # 使用预留实例降低长期运行成本
  reserved_instances:
    - instance_type: "g.n2.large"
      quantity: 5
      term: "1 year"
      payment_option: "all_upfront"  # 全预付，折扣最大
      
  # 使用抢占式实例处理临时任务
  spot_instances:
    - instance_type: "c.n2.xlarge"
      max_price: 0.5  # 最高出价（元/小时）
      interruption_behavior: "terminate"
      
  # 自动伸缩配置
  auto_scaling:
    min_instances: 2
    max_instances: 10
    desired_instances: 3
    
    scale_up:
      metric: "vm.cpu.util"
      threshold: 70
      cooldown: 300
      
    scale_down:
      metric: "vm.cpu.util"
      threshold: 30
      cooldown: 600

resource_cleanup:
  unused_eips:
    auto_release: true
    grace_period_hours: 24
    
  unattached_disks:
    auto_release: true
    grace_period_hours: 48
    
  old_snapshots:
    auto_delete: true
    retention_days: 30
```

## 标签规范示例

```yaml
# tagging-policy.yaml
required_tags:
  - key: "Environment"
    allowed_values:
      - "development"
      - "testing"
      - "staging"
      - "production"
      
  - key: "Application"
    description: "应用名称"
    
  - key: "Owner"
    description: "资源负责人邮箱"
    
  - key: "CostCenter"
    description: "成本中心代码"
    
  - key: "ManagedBy"
    allowed_values:
      - "terraform"
      - "ansible"
      - "manual"
      
optional_tags:
  - key: "Project"
    description: "项目名称"
    
  - key: "Team"
    description: "团队名称"
    
  - key: "Version"
    description: "应用版本"
    
enforcement:
  auto_tag_new_resources: true
  alert_on_missing_tags: true
  block_creation_without_required_tags: false
```

这些配置示例可以根据实际需求进行调整和扩展。建议将配置文件纳入版本控制系统，并建立配置审查流程。