# JD Cloud VM Configuration Examples

## 实例配置示例

### 1. Web服务器配置

```yaml
# web-server-config.yaml
instance:
  name: "web-server"
  description: "Production web server"
  region_id: "cn-north-1"
  az: "cn-north-1a"
  instance_type: "g.n2.medium"
  image_id: "img-centos-7.9"
  
network:
  vpc_id: "vpc-xxxxx"
  subnet_id: "subnet-xxxxx"
  security_groups:
    - "sg-web"
  elastic_ip:
    bandwidth_mbps: 10
    
storage:
  system_disk:
    disk_category: "local"
    disk_size_gb: 40
  data_disks:
    - disk_category: "cloud_ssd"
      disk_size_gb: 100
      device_name: "/dev/vdb"
      mount_point: "/data"
      filesystem: "ext4"
      
access:
  key_name: "web-keypair"
  
monitoring:
  alarms:
    - name: "CPU-High"
      metric: "vm.cpu.util"
      threshold: 80
      comparison_operator: "gt"
      period: 300
      evaluation_periods: 3
      level: "warning"
      
    - name: "Memory-High"
      metric: "vm.memory.util"
      threshold: 85
      comparison_operator: "gt"
      period: 300
      evaluation_periods: 2
      level: "warning"
      
tags:
  Environment: "production"
  Application: "web"
  Team: "backend"
  CostCenter: "IT-001"
```

### 2. 数据库服务器配置

```yaml
# database-server-config.yaml
instance:
  name: "mysql-primary"
  description: "Primary MySQL database server"
  region_id: "cn-north-1"
  az: "cn-north-1a"
  instance_type: "r.n2.xlarge"  # 内存优化型
  image_id: "img-centos-7.9"
  
network:
  vpc_id: "vpc-xxxxx"
  subnet_id: "subnet-db"
  security_groups:
    - "sg-database"
  private_ip_only: true  # 不分配公网IP
  
storage:
  system_disk:
    disk_category: "cloud_ssd"
    disk_size_gb: 100
  data_disks:
    - disk_category: "cloud_ssd"
      disk_size_gb: 500
      device_name: "/dev/vdb"
      mount_point: "/var/lib/mysql"
      filesystem: "xfs"
      iops: 3000
      
backup:
  snapshot_policy:
    enabled: true
    cron_expression: "0 2 * * *"  # 每天凌晨2点
    retention_days: 7
    
monitoring:
  alarms:
    - name: "CPU-High"
      metric: "vm.cpu.util"
      threshold: 70
      comparison_operator: "gt"
      period: 300
      evaluation_periods: 2
      level: "warning"
      
    - name: "Memory-Critical"
      metric: "vm.memory.util"
      threshold: 90
      comparison_operator: "gt"
      period: 300
      evaluation_periods: 1
      level: "critical"
      
    - name: "Disk-High"
      metric: "vm.disk.util"
      threshold: 80
      comparison_operator: "gt"
      period: 300
      evaluation_periods: 2
      level: "warning"
      
tags:
  Environment: "production"
  Application: "database"
  Role: "primary"
  Team: "dba"
```

### 3. 批处理任务配置

```yaml
# batch-job-config.yaml
instance:
  name_prefix: "batch-worker"
  description: "Batch processing worker nodes"
  region_id: "cn-north-1"
  az: 
    - "cn-north-1a"
    - "cn-north-1b"
  instance_type: "c.n2.xlarge"  # 计算优化型
  image_id: "img-ubuntu-20.04"
  count: 5
  
network:
  vpc_id: "vpc-xxxxx"
  subnet_id: "subnet-batch"
  security_groups:
    - "sg-batch"
    
storage:
  system_disk:
    disk_category: "local"
    disk_size_gb: 40
  data_disks:
    - disk_category: "cloud_efficiency"
      disk_size_gb: 200
      device_name: "/dev/vdb"
      mount_point: "/scratch"
      auto_delete: true
      
lifecycle:
  auto_shutdown: true
  max_runtime_hours: 24
  charge_mode: "postpaid_by_duration"
  
tags:
  Environment: "production"
  Application: "batch-processing"
  Team: "data-engineering"
```

## 安全组规则示例

### Web服务器安全组

```yaml
# web-security-group.yaml
security_group:
  name: "web-sg"
  description: "Security group for web servers"
  vpc_id: "vpc-xxxxx"
  
rules:
  ingress:
    - protocol: "tcp"
      from_port: 80
      to_port: 80
      source: "0.0.0.0/0"
      description: "Allow HTTP"
      
    - protocol: "tcp"
      from_port: 443
      to_port: 443
      source: "0.0.0.0/0"
      description: "Allow HTTPS"
      
    - protocol: "tcp"
      from_port: 22
      to_port: 22
      source: "192.168.1.0/24"  # 仅允许办公网络
      description: "Allow SSH from office"
      
  egress:
    - protocol: "-1"
      from_port: -1
      to_port: -1
      destination: "0.0.0.0/0"
      description: "Allow all outbound"
```

### 数据库安全组

```yaml
# database-security-group.yaml
security_group:
  name: "database-sg"
  description: "Security group for database servers"
  vpc_id: "vpc-xxxxx"
  
rules:
  ingress:
    - protocol: "tcp"
      from_port: 3306
      to_port: 3306
      source: "192.168.1.0/24"  # 应用服务器网段
      description: "Allow MySQL from app servers"
      
    - protocol: "tcp"
      from_port: 22
      to_port: 22
      source: "192.168.100.0/24"  # 堡垒机网段
      description: "Allow SSH from bastion"
      
  egress:
    - protocol: "-1"
      from_port: -1
      to_port: -1
      destination: "0.0.0.0/0"
      description: "Allow all outbound"
```

