name: Skill Tests

on:
  push:
    branches: [main, master]
    paths:
      - "jdcloud-*/**"
      - "tests/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "jdcloud-*/**"
      - "tests/**"
      - ".github/workflows/tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          source .venv/bin/activate
          uv pip install pytest pytest-html pytest-json-report ruff jsonschema pyyaml

      - name: Clear __pycache__
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Run ruff check
        run: |
          source .venv/bin/activate
          ruff check jdcloud-*/tests/ tests/

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          pytest \
            --tb=short \
            --html=report.html \
            --self-contained-html \
            --json-report \
            --json-report-file=report.json \
            -v \
            jdcloud-*/tests/ tests/ 2>&1 | tee test_output.log
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: test-report-html-${{ matrix.python-version }}
          path: report.html
          retention-days: 30

      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        with:
          name: test-report-json-${{ matrix.python-version }}
          path: report.json
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('report.json', 'utf8'));
            } catch (e) {
              console.log('Could not parse report.json');
              return;
            }

            const summary = report.summary || {};
            const total = summary.total || 0;
            const passed = summary.passed || 0;
            const failed = summary.failed || 0;
            const skipped = summary.skipped || 0;
            const duration = summary.duration ? (summary.duration / 1000).toFixed(2) + 's' : 'N/A';

            const status = failed === 0 ? '✅ PASSED' : '❌ FAILED';
            const body = `## ${status} - Skill Test Results

            | Metric | Count |
            |--------|-------|
            | Total | ${total} |
            | Passed | ${passed} ✅ |
            | Failed | ${failed} ❌ |
            | Skipped | ${skipped} ⚠️ |
            | Duration | ${duration} |

            <details>
            <summary>View detailed results</summary>

            ### Test Breakdown by Skill

            ${(report.tests || []).map(t => {
              const outcome = t.outcome === 'passed' ? '✅' : t.outcome === 'failed' ? '❌' : '⚠️';
              return `- ${outcome} \`${t.nodeid}\`${t.duration ? ` (${t.duration.toFixed(2)}s)` : ''}`;
            }).join('\n')}

            </details>

            ---
            *Report generated by GitHub Actions*`
            .replace(/^\s+/gm, '');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if tests failed
        run: |
          source .venv/bin/activate
          pytest jdcloud-*/tests/ tests/ --tb=short -q
