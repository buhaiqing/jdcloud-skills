# Monitoring policies
policies:
  # Collection period configuration
  collection:
    vm:
      period: 60
    rds:
      period: 60
    lb:
      period: 60
    custom:
      period: 60
      
  # Data retention policy
  retention:
    raw_data: 15  # days
    hour_aggregation: 30  # days
    day_aggregation: 180  # days
    
  # Alarm suppression policy
  suppression:
    enabled: true
    cooldown_period: 300  # seconds
    max_notifications: 5  # max notifications per hour