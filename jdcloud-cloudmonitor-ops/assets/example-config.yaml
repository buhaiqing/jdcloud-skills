# Custom monitoring configuration
custom_metrics:
  namespace: "my-application"
  metrics:
    - name: "order-count"
      unit: "Count"
      dimensions:
        - name: "region"
          value: "cn-north-1"
        - name: "service"
          value: "order-service"
          
    - name: "api-latency"
      unit: "Milliseconds"
      dimensions:
        - name: "endpoint"
          value: "/api/v1/orders"
          
    - name: "error-rate"
      unit: "Percent"
      dimensions:
        - name: "service"
          value: "api-gateway"

# Dashboard configuration
dashboards:
  - name: "Production-Overview"
    description: "Production environment monitoring overview"
    widgets:
      - type: "line"
        title: "CPU Usage Trend"
        service_code: "vm"
        metrics:
          - "vm.cpu.util"
        period: 300
        
      - type: "line"
        title: "Memory Usage Trend"
        service_code: "vm"
        metrics:
          - "vm.memory.util"
        period: 300
        
      - type: "line"
        title: "RDS QPS"
        service_code: "rds"
        metrics:
          - "rds.qps"
        period: 60
        
      - type: "number"
        title: "Active Connections"
        service_code: "lb"
        metrics:
          - "lb.activeconnection"
          
  - name: "Application-Metrics"
    description: "Application custom metrics"
    widgets:
      - type: "line"
        title: "Order Volume"
        namespace: "my-application"
        metric: "order-count"
        period: 60
        
      - type: "line"
        title: "API Latency"
        namespace: "my-application"
        metric: "api-latency"
        period: 60
        
      - type: "line"
        title: "Error Rate"
        namespace: "my-application"
        metric: "error-rate"
        period: 60

