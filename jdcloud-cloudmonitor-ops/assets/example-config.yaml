# JD Cloud Cloud Monitor Alarm Configuration Examples

# VM monitoring alarm configuration
vm_alarms:
  - name: "VM-CPU-Critical"
    service_code: "vm"
    metric_name: "vm.cpu.util"
    comparison_operator: "gt"
    threshold: 90
    period: 300
    evaluation_periods: 2
    level: "critical"
    notice_type: "sms,email"
    
  - name: "VM-CPU-Warning"
    service_code: "vm"
    metric_name: "vm.cpu.util"
    comparison_operator: "gt"
    threshold: 70
    period: 300
    evaluation_periods: 3
    level: "warning"
    notice_type: "email"
    
  - name: "VM-Memory-Critical"
    service_code: "vm"
    metric_name: "vm.memory.util"
    comparison_operator: "gt"
    threshold: 95
    period: 300
    evaluation_periods: 1
    level: "critical"
    notice_type: "sms,email"
    
  - name: "VM-Memory-Warning"
    service_code: "vm"
    metric_name: "vm.memory.util"
    comparison_operator: "gt"
    threshold: 80
    period: 300
    evaluation_periods: 2
    level: "warning"
    notice_type: "email"
    
  - name: "VM-Disk-Critical"
    service_code: "vm"
    metric_name: "vm.disk.util"
    comparison_operator: "gt"
    threshold: 85
    period: 300
    evaluation_periods: 1
    level: "critical"
    notice_type: "sms,email"
    
  - name: "VM-Disk-Warning"
    service_code: "vm"
    metric_name: "vm.disk.util"
    comparison_operator: "gt"
    threshold: 70
    period: 300
    evaluation_periods: 2
    level: "warning"
    notice_type: "email"
    
  - name: "VM-Load-High"
    service_code: "vm"
    metric_name: "vm.cpu.load1"
    comparison_operator: "gt"
    threshold: 8
    period: 300
    evaluation_periods: 2
    level: "warning"
    notice_type: "email"

