# 监控策略
policies:
  # 采集周期配置
  collection:
    vm:
      period: 60
    rds:
      period: 60
    lb:
      period: 60
    custom:
      period: 60
      
  # 数据保留策略
  retention:
    raw_data: 15  # 天
    hour_aggregation: 30  # 天
    day_aggregation: 180  # 天
    
  # 告警抑制策略
  suppression:
    enabled: true
    cooldown_period: 300  # 秒
    max_notifications: 5  # 每小时最大通知次数
