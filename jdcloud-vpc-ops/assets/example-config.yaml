# jdcloud-vpc-ops Configuration Example

# ================================================
# Credentials — NEVER hardcode, NEVER log, NEVER commit
# ================================================
# CLI mode: ~/.jdc/config INI file
# SDK mode: env vars JDC_ACCESS_KEY / JDC_SECRET_KEY
# .env file: cp .env.example .env (already gitignored)

# ================================================
# Runtime environment variables ({{env.*}})
# ================================================
x-env: &env
  JDC_ACCESS_KEY: "{{env.JDC_ACCESS_KEY}}"   # NEVER ask user
  JDC_SECRET_KEY: "{{env.JDC_SECRET_KEY}}"   # NEVER log, NEVER print
  JDC_REGION: "{{env.JDC_REGION:cn-north-1}}" # Default region

# ================================================
# User input ({{user.*}})
# ================================================
x-user: &user
  vpc_name: "{{user.vpc_name:prod-beijing-vpc}}"
  vpc_cidr: "{{user.vpc_cidr:10.0.0.0/16}}"
  vpc_description: "{{user.vpc_description:Production VPC}}"

# Subnet configuration
subnet_config:
  count: "{{user.subnet_count:3}}"
  items:
    - subnet_name: "{{user.subnet_1_name:app-a}}"
      cidr: "{{user.subnet_1_cidr:10.0.1.0/24}}"
      az: "{{user.subnet_1_az:cn-north-1a}}"
    - subnet_name: "{{user.subnet_2_name:db-a}}"
      cidr: "{{user.subnet_2_cidr:10.0.2.0/24}}"
      az: "{{user.subnet_2_az:cn-north-1a}}"
    - subnet_name: "{{user.subnet_3_name:app-b}}"
      cidr: "{{user.subnet_3_cidr:10.0.3.0/24}}"
      az: "{{user.subnet_3_az:cn-north-1b}}"

# Security group configuration
sg_items:
  - sg_name: "web-sg"
    description: "Web tier"
    rules:
      - protocol: "tcp"
        direction: "inbound"
        port: "80"
        cidr: "0.0.0.0/0"
        description: "HTTP"
      - protocol: "tcp"
        direction: "inbound"
        port: "443"
        cidr: "0.0.0.0/0"
        description: "HTTPS"
      - protocol: "tcp"
        direction: "inbound"
        port: "22"
        cidr: "10.0.0.0/8"
        description: "SSH from internal"
  - sg_name: "db-sg"
    description: "Database tier"
    rules:
      - protocol: "tcp"
        direction: "inbound"
        port: "3306"
        cidr: "10.0.0.0/8"
        description: "MySQL from internal"
      - protocol: "tcp"
        direction: "inbound"
        port: "6379"
        cidr: "10.0.0.0/8"
        description: "Redis from internal"

# ================================================
# Operation parameters
# ================================================
general:
  region: "{{env.JDC_REGION:cn-north-1}}"
  page_size: 100
  retry_count: 3
  retry_backoff_seconds: 2

# ================================================
# Safety gate configuration
# ================================================
safety_gates:
  # Delete operations require exact user confirmation
  require_exact_confirmation: true
  # High-risk ports require additional confirmation
  high_risk_ports: [22, 3389, 6379, 3306]
  # Max security group rules count (recommend cleanup if exceeded)
  sg_rule_warning_threshold: 80