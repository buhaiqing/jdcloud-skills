# JD Cloud VPC Example Configuration
# This file provides example configurations for VPC resources

# VPC Configuration
vpc:
  name: "production-vpc"
  cidr_block: "10.0.0.0/16"
  description: "Production VPC for application workloads"
  region: "cn-north-1"
  
  # Subnet Configuration
  subnets:
    - name: "public-subnet-1a"
      cidr_block: "10.0.1.0/24"
      availability_zone: "cn-north-1a"
      type: "public"
      
    - name: "public-subnet-1b"
      cidr_block: "10.0.2.0/24"
      availability_zone: "cn-north-1b"
      type: "public"
      
    - name: "private-subnet-1a"
      cidr_block: "10.0.3.0/24"
      availability_zone: "cn-north-1a"
      type: "private"
      
    - name: "private-subnet-1b"
      cidr_block: "10.0.4.0/24"
      availability_zone: "cn-north-1b"
      type: "private"

# Security Group Configuration
security_groups:
  - name: "web-sg"
    description: "Security group for web servers"
    inbound_rules:
      - protocol: "tcp"
        from_port: 80
        to_port: 80
        cidr_block: "0.0.0.0/0"
        description: "Allow HTTP traffic"
        
      - protocol: "tcp"
        from_port: 443
        to_port: 443
        cidr_block: "0.0.0.0/0"
        description: "Allow HTTPS traffic"
        
      - protocol: "tcp"
        from_port: 22
        to_port: 22
        cidr_block: "10.0.0.0/16"
        description: "Allow SSH from VPC"
        
    outbound_rules:
      - protocol: "-1"
        from_port: 0
        to_port: 0
        cidr_block: "0.0.0.0/0"
        description: "Allow all outbound traffic"

  - name: "db-sg"
    description: "Security group for database servers"
    inbound_rules:
      - protocol: "tcp"
        from_port: 3306
        to_port: 3306
        cidr_block: "10.0.0.0/16"
        description: "Allow MySQL from VPC"
        
    outbound_rules:
      - protocol: "-1"
        from_port: 0
        to_port: 0
        cidr_block: "0.0.0.0/0"
        description: "Allow all outbound traffic"

# Network ACL Configuration
network_acls:
  - name: "public-acl"
    description: "Network ACL for public subnets"
    inbound_rules:
      - rule_number: 100
        protocol: "tcp"
        port_range: "80-80"
        cidr_block: "0.0.0.0/0"
        action: "allow"
        direction: "ingress"
        
      - rule_number: 110
        protocol: "tcp"
        port_range: "443-443"
        cidr_block: "0.0.0.0/0"
        action: "allow"
        direction: "ingress"
        
      - rule_number: 200
        protocol: "-1"
        port_range: "0-65535"
        cidr_block: "0.0.0.0/0"
        action: "deny"
        direction: "ingress"
        
    outbound_rules:
      - rule_number: 100
        protocol: "-1"
        port_range: "0-65535"
        cidr_block: "0.0.0.0/0"
        action: "allow"
        direction: "egress"

# Route Table Configuration
route_tables:
  - name: "public-rt"
    description: "Route table for public subnets"
    routes:
      - destination_cidr_block: "0.0.0.0/0"
        gateway_type: "internetGateway"
        description: "Route to internet"
        
  - name: "private-rt"
    description: "Route table for private subnets"
    routes:
      - destination_cidr_block: "0.0.0.0/0"
        gateway_type: "natGateway"
        description: "Route to NAT gateway"

# NAT Gateway Configuration
nat_gateway:
  name: "production-nat"
  description: "NAT gateway for private subnets"
  spec: "2"  # NAT gateway specification
  
  # SNAT Rules
  snat_rules:
    - subnet_id: "subnet-private-1a"
      elastic_ip: "eip-abc123def"
      
    - subnet_id: "subnet-private-1b"
      elastic_ip: "eip-abc123def"

# VPC Peering Configuration
vpc_peering:
  - name: "peer-with-dev-vpc"
    description: "Peering connection to development VPC"
    peer_vpc_id: "vpc-dev123ghi"
    peer_region: "cn-north-1"
    
# Monitoring Configuration
monitoring:
  enabled: true
  metrics:
    - name: "vpc_count"
      threshold: 10
      period: 300
      
    - name: "subnet_ip_utilization"
      threshold: 80
      period: 300
      
  alerts:
    - name: "high-vpc-count"
      metric: "vpc_count"
      threshold: 10
      notification:
        type: "email"
        recipients:
          - "ops-team@example.com"

# Tags Configuration
tags:
  Environment: "production"
  Team: "platform"
  Project: "web-application"
  ManagedBy: "terraform"

# Backup Configuration
backup:
  enabled: true
  retention_days: 30
  backup_window: "02:00-04:00"
  timezone: "Asia/Shanghai"

# Compliance Configuration
compliance:
  enabled: true
  policies:
    - name: "no-public-ssh"
      description: "Ensure SSH is not open to the world"
      check: "security_group_rule"
      condition: "port_22_not_open_to_0.0.0.0/0"
      
    - name: "encryption-required"
      description: "Ensure data encryption is enabled"
      check: "resource_configuration"
      condition: "encryption_enabled"

# Cost Optimization
cost_optimization:
  enabled: true
  recommendations:
    - type: "right_sizing"
      description: "Optimize resource sizes based on usage"
      
    - type: "reserved_capacity"
      description: "Use reserved capacity for predictable workloads"
      
    - type: "auto_scaling"
      description: "Implement auto-scaling for variable workloads"