# JD Cloud Redis Example Configuration
# This file provides example configurations for creating Redis instances

# Standard Version Example (master-slave)
standard_version:
  instance_name: "my-standard-redis"
  instance_class: "redis.micro"  # 1GB memory
  cache_instance_type: "master-slave"  # Standard version
  redis_version: "5.0"
  vpc_id: "vpc-abc123def456"
  subnet_id: "subnet-ghi789jkl012"
  az_spec:
    az_specify_type: "SpecifyByReplicaGroup"
    master_az: "cn-north-1a"
    slave_az: "cn-north-1b"
  db_num: 16
  replica_number: 2  # 1 master + 1 slave
  charge:
    charge_mode: "postpaid_by_duration"  # Pay-as-you-go
  password: "SecureRedisPassword123!"
  
# Proxy Cluster Version Example
proxy_cluster_version:
  instance_name: "my-proxy-cluster-redis"
  instance_class: "redis.cluster.g.small"  # 2GB per shard
  cache_instance_type: "cluster"  # Proxy cluster version
  redis_version: "5.0"
  vpc_id: "vpc-abc123def456"
  subnet_id: "subnet-ghi789jkl012"
  az_spec:
    az_specify_type: "SpecifyByCluster"
    azs_for_cluster: ["cn-north-1a", "cn-north-1b"]
  shard_count: 4  # Number of shards
  db_num: 32
  replica_number: 2  # 2 replicas per shard
  charge:
    charge_mode: "prepaid_by_duration"
    charge_unit: "month"
    charge_duration: 3  # 3 months subscription
  password: "ClusterSecurePassword456!"
  ip_whitelist:
    - "192.168.1.0/24"
    - "10.0.0.100"
  
# Native Cluster Version Example
native_cluster_version:
  instance_name: "my-native-cluster-redis"
  instance_class: "redis.native.small"  # 2GB per shard
  cache_instance_type: "native-cluster"  # Native Redis Cluster
  redis_version: "6.2"  # Latest version with ACL support
  vpc_id: "vpc-abc123def456"
  subnet_id: "subnet-ghi789jkl012"
  az_spec:
    az_specify_type: "SpecifyByCluster"
    azs_for_cluster: ["cn-north-1a", "cn-north-1b"]
  shard_count: 8
  db_num: 16
  replica_number: 2
  enable_smart_proxy: 1  # Enable SmartProxy for non-cluster-aware clients
  charge:
    charge_mode: "prepaid_by_duration"
    charge_unit: "year"
    charge_duration: 1  # 1 year subscription
  password: "NativeClusterPassword789!"
  redis_accounts:  # Redis ACL accounts (6.2+ only)
    - account_name: "readonly_user"
      account_password: "ReadOnlyPass123"
      account_privilege: "read"
    - account_name: "write_user"
      account_password: "WritePass456"
      account_privilege: "write"
  
# Backup Policy Configuration Example
backup_policy:
  instance_id: "redis-abc123xyz789"
  backup_period:  # Backup days
    - "Monday"
    - "Wednesday"
    - "Friday"
    - "Sunday"
  backup_time: "02:00-Z+8"  # 2:00 AM Beijing time
  retention_days: 7  # Backup retention
  
# Instance Config Parameters Example
instance_config:
  instance_id: "redis-abc123xyz789"
  parameters:
    - name: "maxmemory-policy"
      value: "volatile-lru"  # Evict least recently used keys with expiry
    - name: "timeout"
      value: "300"  # Client timeout in seconds
    - name: "maxclients"
      value: "10000"  # Maximum connections
    - name: "slowlog-log-slower-than"
      value: "10000"  # Log operations slower than 10ms
      
# Security Configuration Example
security_config:
  instance_id: "redis-abc123xyz789"
  ip_whitelist:
    - "10.0.0.0/8"  # Internal network
    - "192.168.0.0/16"  # Internal network
    - "172.16.0.100"  # Specific application server
  disabled_commands:  # Dangerous commands to disable
    - "FLUSHALL"
    - "FLUSHDB"
    - "KEYS"
    - "DEBUG"
    
# Performance Analysis Configuration Example
analysis_config:
  instance_id: "redis-abc123xyz789"
  analysis_threshold:
    hot_key_threshold: 1000  # Keys accessed >1000 times
    big_key_threshold: 10240  # Keys >10KB
  analysis_time:
    schedule: "daily"
    time: "03:00-Z+8"  # 3:00 AM Beijing time
    
# Common Region IDs
regions:
  cn-north-1: "华北-北京 (North China - Beijing)"
  cn-south-1: "华南-广州 (South China - Guangzhou)"
  cn-east-2: "华东-上海 (East China - Shanghai)"
  
# Common Availability Zone IDs
availability_zones:
  cn-north-1a: "Beijing Availability Zone A"
  cn-north-1b: "Beijing Availability Zone B"
  cn-south-1a: "Guangzhou Availability Zone A"
  cn-south-1b: "Guangzhou Availability Zone B"
  cn-east-2a: "Shanghai Availability Zone A"
  cn-east-2b: "Shanghai Availability Zone B"
  
# Instance Class Examples (verify with describeSpecConfig API)
instance_classes:
  standard:
    micro: "redis.micro"  # 1GB
    small: "redis.small"  # 2GB
    medium: "redis.medium"  # 4GB
    large: "redis.large"  # 8GB
    xlarge: "redis.xlarge"  # 16GB
  proxy_cluster:
    g_micro: "redis.cluster.g.micro"  # 1GB per shard
    g_small: "redis.cluster.g.small"  # 2GB per shard
    g_medium: "redis.cluster.g.medium"  # 4GB per shard
    g_large: "redis.cluster.g.large"  # 8GB per shard
  native_cluster:
    n_micro: "redis.native.micro"  # 1GB per shard
    n_small: "redis.native.small"  # 2GB per shard
    n_medium: "redis.native.medium"  # 4GB per shard
    
# Use Case Recommendations
use_cases:
  session_cache:
    architecture: "master-slave"
    memory: "1-4GB"
    replicas: 2
    note: "Low latency, high availability for user sessions"
    
  data_cache:
    architecture: "cluster"
    memory: "8-64GB"
    shards: "4-16"
    replicas: 2
    note: "Large cache capacity, high throughput"
    
  leaderboard:
    architecture: "master-slave"
    memory: "4-16GB"
    replicas: 2
    note: "Sorted set operations, moderate QPS"
    
  inventory_management:
    architecture: "cluster"
    memory: "16-128GB"
    shards: "8-32"
    replicas: 2
    note: "High concurrency, atomic operations for inventory"
    
  message_queue_light:
    architecture: "master-slave"
    memory: "4-8GB"
    replicas: 2
    note: "List operations, lightweight messaging"
    
  real_time_analytics:
    architecture: "native-cluster"
    memory: "64-256GB"
    shards: "16-64"
    replicas: 2
    enable_smart_proxy: 0
    note: "Direct connection, ultra-low latency for analytics"