# JD Cloud Redis Example Configuration

## Environment Variables

```bash
# JD Cloud Credentials (REQUIRED)
export JDC_ACCESS_KEY="your-access-key-here"
export JDC_SECRET_KEY="your-secret-key-here"
export JDC_REGION="cn-north-1"

# Redis Connection (after instance creation)
export REDIS_HOST="your-redis-endpoint.jdcloud.com"
export REDIS_PORT="6379"
export REDIS_PASSWORD="your-redis-password"
```

## Instance Configuration Examples

### Development Instance

```yaml
# Low-cost instance for development/testing
instance:
  name: "dev-redis-01"
  region: "cn-north-1"
  az: "cn-north-1a"
  spec: "redis.sw.1g"  # 1GB memory
  redis_version: "6.2"
  vpc_id: "vpc-dev-123"
  subnet_id: "subnet-dev-456"
  charge_mode: "postpaid_by_duration"
  password: "DevPass123!@#"
  
whitelist:
  - "10.0.0.0/16"  # Development VPC
  
disabled_commands:
  - "FLUSHALL"
  - "FLUSHDB"
  - "KEYS"
```

