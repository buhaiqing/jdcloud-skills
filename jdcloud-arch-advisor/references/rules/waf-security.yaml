pillar: Security
rules:
  - id: WAF-SEC-001
    title: IAM 子用户启用 MFA
    severity: critical
    check_type: config
    resource_type: IAM
    description: 所有 IAM 子用户应启用多因素认证(MFA)，以防止凭证泄露导致账号被接管
    check_logic:
      field: LoginProfile.MFABindRequired
      operator: equals
      value: true
    remediation: 为所有 IAM 子用户启用 MFA 认证，建议使用虚拟 MFA 或硬件 MFA 设备
    data_source: jdcloud-iam-ops

  - id: WAF-SEC-002
    title: AccessKey 定期轮换
    severity: high
    check_type: config
    resource_type: IAM
    description: AccessKey 应每 90 天轮换一次，降低长期凭证泄露风险
    check_logic:
      field: AccessKeyLastUsed
      operator: days_since
      value: 90
    remediation: 创建新 AK 并更新应用程序，然后禁用并删除旧 AK
    data_source: jdcloud-iam-ops

  - id: WAF-SEC-003
    title: 启用操作审计 ActionTrail
    severity: high
    check_type: existence
    resource_type: ActionTrail
    description: 应启用全局 ActionTrail 记录所有 API 操作，满足审计和合规要求
    check_logic:
      field: TrailList
      operator: exists
    remediation: jdc actiontrail create-trail --创建全局跟踪，并开启日志记录
    data_source: jdcloud-audit-ops

  - id: WAF-SEC-004
    title: VM 安全组禁止开放 SSH/RDP 到全网
    severity: critical
    check_type: config
    resource_type: VM
    description: VM 安全组不应允许 0.0.0.0/0 访问 SSH(22)或 RDP(3389)端口
    check_logic:
      field: SecurityGroupRules
      operator: not_contains
      value: "0.0.0.0/0:22|0.0.0.0/0:3389"
    remediation: 将 SSH/RDP 访问源 IP 限制为特定管理网段，禁止全网开放
    data_source: jdcloud-vpc-ops

  - id: WAF-SEC-005
    title: 公网 CLB 开启 Web 应用防护
    severity: critical
    check_type: relation
    resource_type: CLB
    description: 面向公网的 CLB 实例应接入 Web 应用防护（WAF 或高防 IP）进行安全防护
    check_logic:
      field: WafInstanceIds
      operator: not_empty
    remediation: 为公网 CLB 实例购买并配置 WAF 防护
    data_source: jdcloud-clb-ops

  - id: WAF-SEC-006
    title: KMS 密钥自动轮转
    severity: high
    check_type: config
    resource_type: KMS
    description: KMS 主密钥应启用自动轮转，定期更新加密材料
    check_logic:
      field: AutomaticRotation
      operator: equals
      value: Enabled
    remediation: jdc kms set-key-rotation-policy --EnableAutomaticRotation true --RotationInterval 365d
    data_source: jdcloud-kms-ops

  - id: WAF-SEC-007
    title: 数据库开启 TLS/SSL 传输加密
    severity: high
    check_type: config
    resource_type: RDS
    description: JCS for MySQL/PostgreSQL/MongoDB 实例应开启 TLS/SSL 传输加密
    check_logic:
      field: SSLEnabled
      operator: equals
      value: true
    remediation: 在数据库实例配置中开启 SSL 加密，强制客户端使用 SSL 连接
    data_source: jdcloud-mysql-ops / jdcloud-postgresql-ops / jdcloud-mongodb-ops

  - id: WAF-SEC-008
    title: 数据库禁止公网访问
    severity: critical
    check_type: config
    resource_type: RDS
    description: JCS 数据库实例不应开启公网访问，避免数据库直接暴露在互联网
    check_logic:
      field: PublicConnectionString
      operator: is_null
    remediation: 关闭数据库公网地址，仅通过内网连接访问数据库
    data_source: jdcloud-mysql-ops / jdcloud-postgresql-ops / jdcloud-mongodb-ops

  - id: WAF-SEC-009
    title: CLB 配置 SSL 证书
    severity: high
    check_type: existence
    resource_type: CLB
    description: 面向公网的 CLB 监听器应配置 SSL/TLS 证书，启用 HTTPS
    check_logic:
      field: ListenerProtocol
      operator: in
      value: ["HTTPS", "SSL"]
    remediation: 为 CLB 配置 SSL 证书，使用 HTTPS 监听器替代 HTTP
    data_source: jdcloud-clb-ops

  - id: WAF-SEC-010
    title: 对象存储 Bucket 禁止公开访问
    severity: critical
    check_type: config
    resource_type: OSS
    description: 对象存储 Bucket 不应配置公共读或公共写权限
    check_logic:
      field: BucketACL
      operator: not_equals
      value: public-read-write
    remediation: 将对象存储 Bucket ACL 设置为 private，使用 IAM 策略控制访问
    data_source: (无对应 skill，标记为 manual check)

  - id: WAF-SEC-011
    title: 安全组最小化原则
    severity: high
    check_type: config
    resource_type: VM
    description: VM 安全组入/出方向规则应遵循最小化原则，避免开放无关端口
    check_logic:
      field: UnusedRuleCount
      operator: gte
      value: 5
    remediation: 审查安全组规则，删除 6 个月未命中的规则
    data_source: jdcloud-vpc-ops

  - id: WAF-SEC-012
    title: VPC 隔离
    severity: medium
    check_type: existence
    resource_type: VPC
    description: 不同环境（生产/测试/办公）应使用不同 VPC，通过对等连接或 VPN 控制互访
    check_logic:
      field: VpcId
      operator: multi_vpc
    remediation: 为生产、预发、测试环境分别创建独立 VPC
    data_source: jdcloud-vpc-ops

  - id: WAF-SEC-013
    title: 启用 DDoS 防护
    severity: high
    check_type: existence
    resource_type: DDoS
    description: 公网 IP 资源应开启 DDoS 防护或高防 IP 服务
    check_logic:
      field: DdosProtectionEnabled
      operator: equals
      value: true
    remediation: 购买并配置京东云 DDoS 防护或高防 IP 服务
    data_source: jdcloud-eip-ops

  - id: WAF-SEC-014
    title: 凭据定期轮转
    severity: medium
    check_type: config
    resource_type: KMS
    description: 在 KMS 凭据管理器中的数据库口令等凭据应配置自动轮转
    check_logic:
      field: SecretRotationEnabled
      operator: equals
      value: true
    remediation: 在 KMS 凭据管理器中配置凭据自动轮转策略
    data_source: jdcloud-kms-ops

  - id: WAF-SEC-015
    title: 审计日志保留不少于 180 天
    severity: high
    check_type: config
    resource_type: ActionTrail
    description: ActionTrail 审计日志应保留至少 180 天以满足合规审计要求
    check_logic:
      field: TrailLogRetentionDays
      operator: gte
      value: 180
    remediation: 配置 ActionTrail 将日志投递到对象存储并设置生命周期规则保留 180 天以上
    data_source: jdcloud-audit-ops

  - id: WAF-SEC-016
    title: IAM 策略最小权限
    severity: high
    check_type: config
    resource_type: IAM
    description: IAM 策略应遵循最小权限原则，避免授予 AdministratorAccess 等过宽权限
    check_logic:
      field: PolicyDocument
      operator: not_contains
      value: '"Action": "*"|"Resource": "*"'
    remediation: 审查 IAM 策略，将 `*:*` 替换为具体的产品/资源限制
    data_source: jdcloud-iam-ops
