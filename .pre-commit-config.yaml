repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json

  - repo: local
    hooks:
      - id: validate-skills
        name: Validate Skills
        description: Run skill structure validator on all skills
        entry: python3 scripts/validate_skill.py --all
        language: system
        pass_filenames: false
        always_run: true