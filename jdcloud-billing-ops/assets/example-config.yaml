# JD Cloud Billing Ops — Example Configuration
# Copy this file as config.yaml and modify

# SDK connection configuration
sdk:
  region: cn-north-1
  timeout: 30  # Request timeout (seconds)

# Cost optimization default parameters
cost_optimization:
  # Plan A: Voucher priority — expiry warning days
  voucher_urgent_days: 30

  # Plan B: Combined optimum — balance buffer ratio (0.0 ~ 1.0)
  # 0.2 = reserve 20% balance as buffer
  balance_buffer_ratio: 0.2

  # Plan C: Prepaid discount — comparison durations (months)
  prepaid_durations_months: [1, 3, 6, 12]

# Report output
output:
  dir: outputs
  format: json  # json | markdown