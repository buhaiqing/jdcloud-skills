```

## Terraform Configuration (Alternative)

```yaml
terraform:
  provider:
    access_key: ${JDC_ACCESS_KEY}
    secret_key: ${JDC_SECRET_KEY}
    region: cn-north-1
    
  resources:
    mongodb_instance:
      count: 1
      instance_name: mongodb-${var.environment}
      instance_class: mongodb.s.1.large
      engine_version: "4.0"
      vpc_id: ${var.vpc_id}
      subnet_id: ${var.subnet_id}
      availability_zone: cn-north-1a
      
      tags:
        Environment: ${var.environment}
        ManagedBy: terraform
```

