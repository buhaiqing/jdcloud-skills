## Usage Examples

### Apply Configuration via CLI

```bash
# Create instance from config (parse YAML and call jdc)
# This requires a script to parse YAML and construct CLI commands

# Example Python script:
import yaml

with open('example-config.yaml') as f:
    config = yaml.safe_load(f)

# Extract replica set config
replica_config = config['mongodb_instance']

# Construct jdc command
cmd = f"""
jdc mongodb create-instance \
  --region-id {replica_config['region']} \
  --instance-name {replica_config['instance_name']} \
  --instance-class {replica_config['spec']} \
  --engine-version {replica_config['engine_version']} \
  --vpc-id {replica_config['vpc']['id']} \
  --subnet-id {replica_config['vpc']['subnet_id']} \
  --az-id {replica_config['vpc']['availability_zone']} \
  --charge-mode {replica_config['charge_mode']} \
  --output json
"""

# Execute command
os.system(cmd)
```

### Apply Configuration via SDK

```python
import yaml
from jdcloud_sdk.services.mongodb.client import MongodbClient

# Load config
with open('example-config.yaml') as f:
    config = yaml.safe_load(f)

# Create instance from config
replica_config = config['mongodb_instance']

req = CreateInstanceRequest(
    regionId=replica_config['region'],
    instanceName=replica_config['instance_name'],
    instanceClass=replica_config['spec'],
    engineVersion=replica_config['engine_version'],
    vpcId=replica_config['vpc']['id'],
    subnetId=replica_config['vpc']['subnet_id'],
    azId=replica_config['vpc']['availability_zone'],
    password=replica_config['security']['password']
)

client.create_instance(req)
```