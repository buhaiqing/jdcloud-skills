# JD Cloud MongoDB Example Configuration

## Instance Creation Configuration

### Replica Set Instance (Production)

```yaml
mongodb_instance:
  # Basic settings
  region: cn-north-1
  instance_name: mongodb-prod-replica
  architecture: replica-set
  engine_version: "4.0"
  
  # Instance specification
  spec: mongodb.s.2.large  # 8 vCPU, 16 GB memory
  
  # Network configuration
  vpc:
    id: vpc-xxxx-yyyy
    subnet_id: subnet-xxxx-yyyy
    availability_zone: cn-north-1a
  
  # High availability
  multi_az: false  # Single AZ for cost optimization
  # Or use multi_az: true for cross-AZ deployment
  
  # Storage
  storage:
    type: ssd
    # Storage determined by spec
  
  # Backup configuration
  backup:
    enabled: true
    retention_days: 7
    backup_time: "02:00"  # Daily backup at 2 AM
  
  # Security
  security:
    whitelist:
      - 192.168.1.0/24  # Application subnet
      - 10.0.0.100      # Management server
    password: ChangeMeImmediately123!
  
  # Billing
  charge_mode: postpaid_by_duration  # Pay-as-you-go
  # Or use: charge_mode: prepaid_by_duration for subscription
  
  # Tags
  tags:
    Environment: production
    Application: ecommerce
    Team: backend
    ManagedBy: terraform
```

### Sharded Cluster Instance (Large Scale)

```yaml
mongodb_sharded_cluster:
  # Basic settings
  region: cn-north-1
  instance_name: mongodb-prod-sharding
  architecture: sharded-cluster
  engine_version: "4.0"
  
  # Network
  vpc:
    id: vpc-xxxx-yyyy
    subnet_id: subnet-xxxx-yyyy
    availability_zone: cn-north-1a
  
  # Mongos configuration (query routers)
  mongos:
    spec: mongodb.s.1.medium  # 2 vCPU, 4 GB
    node_count: 3
  
  # Shard configuration (data nodes)
  shard:
    spec: mongodb.s.2.large  # 8 vCPU, 16 GB
    shard_count: 3
    storage_per_shard_gb: 100
  
  # Config server configuration
  config_server:
    spec: mongodb.s.1.small  # Fixed small spec
  
  # Backup
  backup:
    enabled: true
    retention_days: 30  # Longer retention for sharding
  
  # Security
  security:
    whitelist:
      - 192.168.1.0/24
      - 192.168.2.0/24  # Multiple app subnets
    password: SecurePassword456!
  
  # Billing
  charge_mode: prepaid_by_duration  # Subscription for cost savings
  charge_unit: month
  charge_duration: 12  # 12 months
  
  # Tags
  tags:
    Environment: production
    Scale: large
    DataSize: TB
```

## Connection Configuration

### Application Connection (Python)

```yaml
mongodb_connection:
  # Connection parameters
  host: mongodb-xxxx.jcs.jdcloud.com
  port: 27017
  database: myapp
  
  # Authentication
  auth:
    username: appuser
    password: AppUserPassword123
    auth_database: admin
  
  # Connection pool
  pool:
    max_pool_size: 100
    min_pool_size: 10
    
  # Timeout settings
  timeout:
    connect_timeout_ms: 5000
    socket_timeout_ms: 30000
    
  # Write concern
  write_concern:
    w: majority  # Strong consistency
    j: true      # Journal write
    
  # Read preference
  read_preference: primaryPreferred  # Read from primary, fallback to secondary
  
  # Retry
  retry:
    retry_writes: true
    max_retries: 3
    retry_delay_ms: 100
```

### Connection String Format

```
mongodb://appuser:AppUserPassword123@mongodb-xxxx.jcs.jdcloud.com:27017/myapp?authSource=admin&maxPoolSize=100&retryWrites=true&w=majority
```

## Backup Policy Configuration

```yaml
backup_policy:
  # Automated backup
  automated:
    enabled: true
    period_days: 7  # Retention period
    backup_time: "02:00"  # Daily at 2 AM
    
  # Manual backup triggers
  manual:
    triggers:
      - before_major_upgrade
      - before_spec_change
      - monthly_snapshot
    
  # Cross-region backup
  cross_region:
    enabled: false  # Enable for disaster recovery
    target_region: cn-south-1
    
  # Backup naming convention
  naming:
    pattern: "{instance_name}-{date}-{type}"
    # Example: mongodb-prod-20260503-pre-upgrade
```

## Monitoring Configuration

```yaml
monitoring:
  # Metrics to collect
  metrics:
    - cpu_usage
    - memory_usage
    - disk_usage
    - connections_current
    - qps_total
    - replica_lag  # For replica sets
    - slowquery_count
    - cache_hitrate
  
  # Alert thresholds
  alerts:
    critical:
      cpu_usage: 90
      memory_usage: 95
      disk_usage: 90
      replica_lag: 60  # seconds
      
    warning:
      cpu_usage: 80
      memory_usage: 85
      disk_usage: 80
      replica_lag: 10  # seconds
      slowquery_count: 10  # per minute
      
  # Notification channels
  notification:
    channels:
      - email: ops-team@example.com
      - sms: +86-138-xxxx-xxxx
      - webhook: https://alerts.example.com/webhook
      
  # Dashboard
  dashboard:
    refresh_interval: 60s
    time_range: 1h  # Default view
```

## Scaling Configuration

```yaml
scaling:
  # Auto-scaling policy (conceptual, requires external automation)
  auto_scale:
    enabled: true
    
    scale_up:
      trigger:
        metric: cpu_usage
        threshold: 85
        duration: 15min
      action:
        target_spec: mongodb.s.2.xlarge  # Scale to 16 vCPU, 32 GB
        
    scale_down:
      trigger:
        metric: cpu_usage
        threshold: 30
        duration: 30min
      action:
        target_spec: mongodb.s.1.large  # Scale down to 4 vCPU, 8 GB
        
  # Manual scaling thresholds
  manual_thresholds:
    data_size:
      warning: 70%  # Plan for scaling
      critical: 90%  # Scale immediately
      
    connections:
      warning: 80%
      critical: 95%
```

## Security Configuration

```yaml
security:
  # IP whitelist
  whitelist:
    enabled: true
    rules:
      - cidr: 192.168.1.0/24
        description: Application subnet
      - cidr: 10.0.0.100/32
        description: Management server
      - cidr: 172.16.0.0/16
        description: Internal network
        
  # Password policy
  password:
    min_length: 12
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_special_chars: true
    rotation_days: 90
    
  # IAM integration
  iam:
    policy:
      effect: Allow
      actions:
        - mongodb:describe*
        - mongodb:create*
        - mongodb:modify*
      resources:
        - mongodb:instance:cn-north-1:*
        
  # TLS (if supported)
  tls:
    enabled: false  # Enable for sensitive data
    
  # Audit
  audit:
    enabled: true
    log_operations:
      - authenticate
      - create
      - delete
      - modify
```

