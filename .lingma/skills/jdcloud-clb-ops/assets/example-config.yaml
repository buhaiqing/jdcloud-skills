# JD Cloud CLB Example Configuration

# CLB Instance Configuration
clb_instance:
  name: "production-web-clb"
  specification: "2"  # CLB specification level
  network_type: "BGP"
  region: "cn-north-1"
  description: "Production web application load balancer"
  
# Listener Configuration
listeners:
  - name: "http-listener"
    protocol: "HTTP"
    port: 80
    backend_server_group: "web-servers"
    health_check:
      type: "HTTP"
      path: "/health"
      port: 80
      healthy_threshold: 3
      unhealthy_threshold: 3
      timeout: 5
      interval: 5
      
  - name: "https-listener"
    protocol: "HTTPS"
    port: 443
    backend_server_group: "web-servers"
    ssl_certificate_id: "cert-xxxxx"
    health_check:
      type: "HTTPS"
      path: "/health"
      port: 443
      healthy_threshold: 3
      unhealthy_threshold: 3
      timeout: 5
      interval: 5

# Backend Server Group Configuration
backend_server_groups:
  - name: "web-servers"
    algorithm: "round_robin"  # round_robin, least_connections, weighted_round_robin
    servers:
      - id: "vm-web-001"
        weight: 10
        port: 8080
      - id: "vm-web-002"
        weight: 10
        port: 8080
      - id: "vm-web-003"
        weight: 5
        port: 8080

# Health Check Configuration
health_check:
  enabled: true
  type: "HTTP"
  path: "/health"
  port: 80
  healthy_threshold: 3
  unhealthy_threshold: 3
  timeout: 5
  interval: 5

# Monitoring and Alerts
monitoring:
  metrics:
    - name: "ActiveConnections"
      threshold: 10000
      period: 300
    - name: "BandwidthIn"
      threshold: 800000000  # 800 Mbps in bits
      period: 300
    - name: "ResponseTime"
      threshold: 1000  # 1 second
      period: 300
  alerts:
    - name: "high-connections"
      metric: "ActiveConnections"
      condition: "greater_than"
      threshold: 8000
      notification:
        - email: "ops-team@example.com"
        - sms: "+8613800138000"

# Security Configuration
security:
  acl_id: "acl-xxxxx"
  security_groups:
    - "sg-web-001"
  ssl_policy: "tls-1-2"
  
# Tags
tags:
  - key: "Environment"
    value: "Production"
  - key: "Application"
    value: "WebFrontend"
  - key: "Team"
    value: "Platform"